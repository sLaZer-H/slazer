<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sLaZer's Profiles</title>
    <style>
        :root {
            /* الألوان متناسقة مع طابع الصورة الأبيض والأسود والبنفسجي الداكن */
            --bg-color: #08060c; 
            --card-bg: rgba(15, 12, 24, 0.75);
            --accent-color: #8c52ff;
            --text-color: #ffffff;
            --text-muted: #aaa5be;
            --border-color: rgba(140, 82, 255, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            
            /* 🖼️ تعيين صورتك كخلفية للموقع بالكامل وتثبيتها وتوسيعها بشكل متناسق */
            background-image: linear-gradient(rgba(8, 6, 12, 0.85), rgba(8, 6, 12, 0.75)), url('background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            overflow-x: hidden;
        }

        /* حاوية الموقع الأساسية مع تأثير الظهور */
        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            
            /* أنيميشن ظهور الحاوية */
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* الصورة الشخصية الصغيرة الدائرية مع حركة نبض خفيفة */
        .profile-img {
            width: 115px;
            height: 115px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-color);
            margin-bottom: 20px;
            box-shadow: 0 0 25px rgba(140, 82, 255, 0.5);
            animation: pulse 3s infinite ease-in-out;
        }

        /* تأثير حركة النص (العنوان الرئيسي) */
        h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            background: linear-gradient(45deg, #ffffff, #cfa9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            animation: fadeInText 0.8s 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* تأثير حركة النص الفرعي */
        .subtitle {
            color: var(--text-muted);
            font-size: 16px;
            margin-bottom: 35px;
            line-height: 1.6;
            opacity: 0;
            animation: fadeInText 0.8s 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .subtitle span {
            display: block;
            margin-bottom: 4px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* الأزرار مع تأثيرات المرور والحركة المستقلة */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px 20px;
            border-radius: 14px;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 600;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(5px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
            transform: translateY(15px);
        }

        /* تحريك الأزرار بالتتابع عند الفتح */
        .btn:nth-child(1) { animation: slideInBtn 0.6s 0.6s forwards; }
        .btn:nth-child(2) { animation: slideInBtn 0.6s 0.7s forwards; }
        .btn:nth-child(3) { animation: slideInBtn 0.6s 0.8s forwards; }
        .btn:nth-child(4) { animation: slideInBtn 0.6s 0.9s forwards; }
        .btn:nth-child(5) { animation: slideInBtn 0.6s 1.0s forwards; }
        .btn:nth-child(6) { animation: slideInBtn 0.6s 1.1s forwards; }
        .btn:nth-child(7) { animation: slideInBtn 0.6s 1.2s forwards; }
        .btn:nth-child(8) { animation: slideInBtn 0.6s 1.3s forwards; }

        .btn:hover {
            background: var(--accent-color);
            border-color: var(--accent-color);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 8px 25px rgba(140, 82, 255, 0.4);
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.25);
            opacity: 0;
            animation: fadeInText 0.8s 1.5s forwards;
        }

        .footer a {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer a:hover {
            color: var(--accent-color);
        }

        /* --- شفرات الأنيميشن (Keyframes) --- */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInText {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInBtn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 25px rgba(140, 82, 255, 0.4); }
            50% { box-shadow: 0 0 40px rgba(140, 82, 255, 0.7); }
        }
    </style>
</head>
